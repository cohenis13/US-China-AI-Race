name: Update Adoption Data

on:
  schedule:
    # Run daily at 09:00 UTC (1 hour after compute, staggered from other workflows)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions UI
    # Go to: Actions tab → "Update Adoption Data" → Run workflow

permissions:
  contents: write   # needed to commit and push data/adoption.json

jobs:
  update-adoption:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch adoption data
        run: python scripts/fetch_adoption.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/adoption.json
          if git diff --cached --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "data: update adoption [$(date -u +'%Y-%m-%d')]"
            git push
          fi
