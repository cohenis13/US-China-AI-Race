name: Update Compute Data

on:
  schedule:
    # Run daily at 08:00 UTC (1 hour after talent, 2 hours after frontier models)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Also allow manual runs from the GitHub Actions UI
    # Go to: Actions tab → "Update Compute Data" → Run workflow

permissions:
  contents: write   # needed to commit and push data/compute.json

jobs:
  update-compute:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch compute data
        run: python scripts/fetch_compute.py

      - name: Rebuild executive summary
        run: python scripts/build_executive_summary.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/compute.json data/executive_summary.json
          if git diff --cached --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "data: update compute [$(date -u +'%Y-%m-%d')]"
            git push
          fi
