name: Update Energy Data

on:
  schedule:
    # Run weekly on Mondays at 11:00 UTC.
    # Underlying sources update annually:
    #   EIA Electric Power Monthly: ~January (US capacity additions)
    #   IEA World Energy Outlook: ~October (China capacity data)
    #   IEA Energy and AI: irregular (data center demand figures)
    #   LBNL Queued Up: ~April–May (US interconnection queue)
    # When new editions are published, update the reference values in
    # scripts/fetch_energy.py; the composite recalculates automatically.
    - cron: '0 11 * * 1'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions UI
    # Go to: Actions tab → "Update Energy Data" → Run workflow

permissions:
  contents: write   # needed to commit and push data/energy.json

jobs:
  update-energy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recalculate energy scaling index
        run: python scripts/fetch_energy.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/energy.json
          if git diff --cached --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "data: update energy index [$(date -u +'%Y-%m-%d')]"
            git push
          fi
