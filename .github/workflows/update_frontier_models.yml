name: Update Frontier Models Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also allow manual runs from the GitHub Actions UI
    # Go to: Actions tab → "Update Frontier Models Data" → Run workflow

permissions:
  contents: write   # needed to commit and push data/frontier_models.json

jobs:
  update-frontier-models:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch frontier models data
        run: python scripts/fetch_frontier_models.py

      - name: Rebuild executive summary
        run: python scripts/build_executive_summary.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/frontier_models.json data/executive_summary.json
          if git diff --cached --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "data: update frontier models [$(date -u +'%Y-%m-%d')]"
            git push
          fi
