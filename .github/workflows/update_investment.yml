name: Update Investment Data

on:
  schedule:
    # Weekly on Mondays at 09:30 UTC (after compute at 08:00)
    # Capex data updates when new 10-K/20-F filings land; private investment is annual
    - cron: '30 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-investment:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch investment data
        run: python scripts/fetch_investment.py

      - name: Rebuild executive summary
        run: python scripts/build_executive_summary.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/investment.json data/executive_summary.json
          if git diff --cached --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "data: update investment [$(date -u +'%Y-%m-%d')]"
            git push
          fi
